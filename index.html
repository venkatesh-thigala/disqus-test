  <script>
    const adSlots = {
        leftRail: 'left-rail',
        rightRail: 'right-rail'
    };
    function loadTempestAds(params) {
        const script = document.createElement('script');
        script.src = 'https://tempest.services.disqus.com/ads.js?' + new URLSearchParams(params).toString();
        script.async = true;
        document.head.appendChild(script);
    }
    loadTempestAds({
        positions: Object.keys(adSlots).join(','),
        shortname: 'casualgamer',
        sourceUrl: window.location.href
    });
    const dqads = window.dqads = window.dqads || {};
    dqads.que = dqads.que || [];
    dqads.que.push(function() {
        Object.entries(adSlots).forEach(([position, divId]) => dqads.startAds(divId, position));
    });
</script>
